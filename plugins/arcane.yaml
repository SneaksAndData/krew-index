  shortDescription: Manage Arcane Streams
  homepage: https://github.com/SneaksAndData/kubectl-plugin-arcane
  caveats: |
    Usage:
      kubectl arcane stream start <stream-class> <stream-id>
      kubectl arcane stream stop <stream-class> <stream-id>
  description: |
    The Arcane plugin allows you to manage Arcane Streams directly from the command line.
    With this plugin, you can easily start and stop streams using simple commands.
    Whether you're a developer or an operator, the Arcane plugin provides a convenient way to interact with your
    streaming applications without needing to navigate through complex interfaces.
    Get started today and streamline your workflow with the Arcane plugin for kubectl!